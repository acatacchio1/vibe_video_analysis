services:
  video-analyzer-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-analyzer-web
    ports:
      - "0.0.0.0:10001:10000"
    volumes:
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
      - ./cache:/app/cache
      - ./config:/app/config
      - ./output:/app/output
      - ./hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=http://host.docker.internal:11434
      - HF_HOME=/root/.cache/huggingface
      # Make ctranslate2/faster-whisper find the nvidia pip package libs.
      # cublas/lib provides the CUDA 12 ABI that ctranslate2 4.x was built against.
      - LD_LIBRARY_PATH=/usr/local/nvidia/lib:/usr/local/nvidia/lib64:/usr/local/lib/python3.10/dist-packages/nvidia/cublas/lib:/usr/local/lib/python3.10/dist-packages/nvidia/cu13/lib
    # GPU support for whisper and other CUDA operations
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Allow container to access host's Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Network mode to access host services easily
    # Comment out if you prefer isolated networking
    # network_mode: host
    networks:
      - video-analyzer-net
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Ollama service within the same network
  # Uncomment if you want Ollama in a container
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: video-analyzer-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   networks:
  #     - video-analyzer-net
  #   restart: unless-stopped

networks:
  video-analyzer-net:
    driver: bridge

volumes:
  ollama-models:
