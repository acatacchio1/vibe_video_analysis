version: '3.8'

services:
  video-analyzer-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-analyzer-web
    ports:
      - "0.0.0.0:10000:10000"
    volumes:
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
      - ./cache:/app/cache
      - ./config:/app/config
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=http://host.docker.internal:11434
    # GPU support for whisper and other CUDA operations
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Allow container to access host's Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Network mode to access host services easily
    # Comment out if you prefer isolated networking
    # network_mode: host
    networks:
      - video-analyzer-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Ollama service within the same network
  # Uncomment if you want Ollama in a container
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: video-analyzer-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   networks:
  #     - video-analyzer-net
  #   restart: unless-stopped

networks:
  video-analyzer-net:
    driver: bridge

volumes:
  ollama-models:
